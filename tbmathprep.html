          <div key={i} style={{background:"#0e0e0e",borderRadius:14,padding:"24px",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{fontSize:24,marginBottom:10}}>📋</div>
            <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:17,fontWeight:700,marginBottom:6}}>{e.name}</div>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:13,marginBottom:12}}>{e.questions.length} questions · Timed</div>
            {tag(e.difficulty)}
            <button onClick={()=>{setActiveExam(i);setExamAnswers({});setExamSubmitted(false);}}
              style={{display:"block",width:"100%",marginTop:16,background:"#e05c2a",color:"#fff",border:"none",padding:"10px",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>Start Exam →</button>
          </div>
        ))}
      </div>
    </div>
  );

  // EXAM ACTIVE
  if (view === "exams" && activeExam !== null) {
    const exam = EXAMS[activeExam];
    if (examSubmitted) {
      const correct = exam.questions.filter((q,i)=>examAnswers[i]===q.correct).length;
      const pct = Math.round((correct/exam.questions.length)*100);
      const est = Math.round(200+(correct/exam.questions.length)*600);
      return (
        <div style={{...s,paddingTop:8}}>
          <div style={{background:"#fff",border:"1.5px solid #e8e0d0",borderRadius:16,padding:"40px",textAlign:"center",maxWidth:560,margin:"0 auto"}}>
            <div style={{fontFamily:"Georgia,serif",fontSize:64,fontWeight:900,color:"#f0a500",lineHeight:1}}>{correct}/{exam.questions.length}</div>
            <div style={{color:"#6b6457",fontSize:13,letterSpacing:1.5,textTransform:"uppercase",margin:"8px 0 12px"}}>Your Score</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:22,fontStyle:"italic",fontWeight:300,marginBottom:24}}>{pct>=80?"Outstanding work! 🏆":pct>=60?"Good effort — review explanations 📖":"Keep practicing — you've got this! 💪"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:28}}>
              {[[`${pct}%`,"Accuracy"],[`~${est}`,"Est. SAT Score"],[`${exam.questions.length-correct}`,"To Review"]].map(([v,l])=>(
                <div key={l} style={{background:"#f5f0e8",borderRadius:10,padding:"14px"}}>
                  <div style={{fontFamily:"Georgia,serif",fontSize:24,fontWeight:900,color:"#1a3a6b"}}>{v}</div>
                  <div style={{fontSize:12,color:"#6b6457"}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{textAlign:"left",marginBottom:24}}>
              {exam.questions.map((q,i)=>{
                const ua=examAnswers[i];
                const ok=ua===q.correct;
                return (
                  <div key={i} style={{padding:"12px",borderRadius:10,border:`1px solid ${ok?"#22c55e":"#ef4444"}`,marginBottom:8,background:ok?"#f0fdf4":"#fef2f2"}}>
                    <div style={{fontSize:13,fontWeight:700,color:ok?"#15803d":"#dc2626",marginBottom:4}}>Q{i+1}: {ok?"✓ Correct":"✗ Incorrect"}</div>
                    <div style={{fontSize:13,color:"#374151",marginBottom:4}}>{q.q}</div>
                    {!ok&&<div style={{fontSize:12,color:"#6b7280"}}>Correct: <strong>{LETTERS[q.correct]}. {q.choices[q.correct]}</strong></div>}
                    <div style={{fontSize:12,color:"#6b7280",marginTop:4,fontStyle:"italic"}}>{q.exp}</div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>{setExamAnswers({});setExamSubmitted(false);}} style={{background:"#e05c2a",color:"#fff",border:"none",padding:"10px 22px",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Retake</button>
              <button onClick={()=>{setActiveExam(null);}} style={{background:"#f5f0e8",color:"#0e0e0e",border:"1px solid #d4cbbf",padding:"10px 22px",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>All Exams</button>
              <button onClick={()=>setView("booking")} style={{background:"#1a3a6b",color:"#fff",border:"none",padding:"10px 22px",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Book Session</button>
            </div>
          </div>
        </div>
      );
    }
    return (
      <div style={{...s,paddingTop:8}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,background:"#0e0e0e",borderRadius:12,padding:"14px 20px"}}>
          <div style={{color:"#fff",fontFamily:"Georgia,serif",fontWeight:700}}>{exam.name}</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:13}}>{Object.keys(examAnswers).length}/{exam.questions.length} answered</div>
          <button onClick={()=>setActiveExam(null)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",padding:"6px 14px",borderRadius:6,cursor:"pointer",fontSize:13}}>Exit</button>
        </div>
        {exam.questions.map((q,qi)=>(
          <div key={qi} style={{background:"#fff",border:"1.5px solid #e8e0d0",borderRadius:14,padding:"22px",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:"#e05c2a",marginBottom:8}}>Question {qi+1}</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,lineHeight:1.5,marginBottom:14}}>{q.q}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {q.choices.map((c,ci)=>(
                <div key={ci} onClick={()=>setExamAnswers(a=>({...a,[qi]:ci}))}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,border:`1.5px solid ${examAnswers[qi]===ci?"#1a3a6b":"#e8e0d0"}`,background:examAnswers[qi]===ci?"#e8f0fe":"#f5f0e8",cursor:"pointer",fontSize:14}}>
                  <span style={{width:24,height:24,borderRadius:"50%",background:examAnswers[qi]===ci?"#1a3a6b":"#d4cbbf",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:examAnswers[qi]===ci?"#fff":"#6b6457",flexShrink:0}}>{LETTERS[ci]}</span>
                  {c}
                </div>
              ))}
            </div>
          </div>
        ))}
        <div style={{position:"sticky",bottom:0,background:"#f5f0e8",padding:"16px 0",borderTop:"1px solid #d4cbbf"}}>
          <button onClick={()=>setExamSubmitted(true)} style={{width:"100%",background:"#e05c2a",color:"#fff",border:"none",padding:"14px",borderRadius:8,fontWeight:800,fontSize:16,cursor:"pointer"}}>
            Submit Exam ({Object.keys(examAnswers).length}/{exam.questions.length} answered) →
          </button>
        </div>
      </div>
    );
  }

  // BOOKING / PRICING
  if (view === "booking") return (
    <div style={{...s,paddingTop:8}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>setView("home")} style={{background:"none",border:"1px solid #d4cbbf",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:13,color:"#6b6457"}}>← Home</button>
        <h2 style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:900,margin:0}}>Pricing & Booking</h2>
      </div>

      {/* Free first session banner */}
      <div style={{background:"linear-gradient(135deg,#16a34a,#15803d)",borderRadius:14,padding:"20px 24px",marginBottom:20,display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontSize:32}}>🎉</div>
        <div>
          <div style={{color:"#fff",fontWeight:800,fontSize:17,marginBottom:4}}>Your first session is completely FREE</div>
          <div style={{color:"rgba(255,255,255,0.75)",fontSize:14}}>No credit card. No commitment. Just book and we'll reach out within 24 hours.</div>
        </div>
      </div>

      {/* Pricing cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:24}}>
        {[
          {tier:"Group",price:"$30",per:"per hour · per student",features:["Small group (2–5 students)","Focused topic each session","Practice problems included","In-person or Zoom"],featured:false},
          {tier:"1-on-1",price:"$50",per:"per hour · private",features:["Private personalized session","Custom study plan","Progress tracking","Direct WhatsApp access","In-person or Zoom"],featured:true},
          {tier:"Bundle",price:"$399",per:"10 sessions · save $100",features:["10 private sessions","Full diagnostic assessment","3 proctored practice exams","Score improvement guarantee","Priority scheduling"],featured:false},
        ].map(({tier,price,per,features,featured})=>(
          <div key={tier} style={{background:featured?"#1a3a6b":"#fff",border:`1.5px solid ${featured?"#1a3a6b":"#e8e0d0"}`,borderRadius:16,padding:"24px 20px",position:"relative"}}>
            {featured&&<div style={{position:"absolute",top:-12,left:"50%",transform:"translateX(-50%)",background:"#e05c2a",color:"#fff",fontSize:10,fontWeight:800,padding:"3px 12px",borderRadius:100,whiteSpace:"nowrap",letterSpacing:0.5}}>MOST POPULAR</div>}
            <div style={{fontSize:11,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:featured?"rgba(255,255,255,0.5)":"#6b6457",marginBottom:6}}>{tier}</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:36,fontWeight:900,color:featured?"#f0a500":"#0e0e0e",lineHeight:1}}>{price}</div>
            <div style={{fontSize:12,color:featured?"rgba(255,255,255,0.5)":"#6b6457",marginBottom:4}}>{per}</div>
            <div style={{fontSize:12,color:"#22c55e",fontWeight:700,marginBottom:14}}>✦ First session free</div>
            <div style={{borderTop:`1px solid ${featured?"rgba(255,255,255,0.15)":"#e8e0d0"}`,marginBottom:14}}/>
            <ul style={{listStyle:"none",padding:0,margin:"0 0 18px",display:"flex",flexDirection:"column",gap:7}}>
              {features.map(f=>(
                <li key={f} style={{display:"flex",gap:8,fontSize:13,color:featured?"rgba(255,255,255,0.75)":"#6b6457",lineHeight:1.4}}>
                  <span style={{color:featured?"#86efac":"#22c55e",fontWeight:800,flexShrink:0}}>✓</span>{f}
                </li>
              ))}
            </ul>
            <button onClick={()=>{const el=document.getElementById("bookingForm");if(el)el.scrollIntoView({behavior:"smooth"});}}
              style={{width:"100%",background:featured?"#e05c2a":"transparent",color:featured?"#fff":featured?"#fff":"#0e0e0e",border:`1.5px solid ${featured?"#e05c2a":"#0e0e0e"}`,padding:"10px",borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer"}}>
              Book Free Session
            </button>
          </div>
        ))}
      </div>

      {/* Desmos course */}
      <div style={{background:"linear-gradient(135deg,#1a3a6b,#0a1a3a)",borderRadius:16,padding:"28px 32px",marginBottom:24}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:24,alignItems:"center"}}>
          <div>
            {tag("💰 Paid Course · One-Time","#f0a500")}
            <h3 style={{fontFamily:"Georgia,serif",fontSize:24,fontWeight:900,color:"#fff",margin:"12px 0 8px"}}>Desmos Mastery Course</h3>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:14,lineHeight:1.7,marginBottom:12}}>Master the Desmos calculator for SAT Math. Save 30+ seconds per problem with strategic graphing tricks taught by Tobias.</p>
            <ul style={{listStyle:"none",padding:0,margin:0,display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {["Finding zeros instantly","Solving quadratics visually","Regression & scatterplots","Intersection of lines","Slider tricks","40+ practice problems"].map(f=>(
                <li key={f} style={{display:"flex",gap:6,fontSize:13,color:"rgba(255,255,255,0.7)"}}>
                  <span style={{color:"#f0a500",fontWeight:800}}>✓</span>{f}
                </li>
              ))}
            </ul>
          </div>
          <div style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,padding:"24px",textAlign:"center",minWidth:160}}>
            <div style={{fontFamily:"Georgia,serif",fontSize:44,fontWeight:900,color:"#f0a500",lineHeight:1}}>$25</div>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginBottom:16}}>one-time · lifetime access</div>
            <button style={{width:"100%",background:"#f0a500",color:"#0e0e0e",border:"none",padding:"10px",borderRadius:8,fontWeight:800,fontSize:14,cursor:"pointer"}}>Get Course →</button>
          </div>
        </div>
      </div>

      {/* Booking form */}
      <div id="bookingForm" style={{background:"#1a3a6b",borderRadius:16,padding:"32px"}}>
        <h3 style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:900,color:"#fff",margin:"0 0 6px"}}>Book Your Free First Session</h3>
        <p style={{color:"rgba(255,255,255,0.55)",fontSize:14,marginBottom:24}}>Fill this out and Tobias will email you at <strong style={{color:"#f0a500"}}>tobias.velez@icloud.com</strong> within 24 hours.</p>
        {formSent ? (
          <div style={{textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:48,marginBottom:12}}>🎉</div>
            <h3 style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:22,marginBottom:8}}>You're all set!</h3>
            <p style={{color:"rgba(255,255,255,0.6)"}}>Tobias will reach out to <strong style={{color:"#f0a500"}}>{formData.email}</strong> within 24 hours.</p>
          </div>
        ) : (
          <div style={{display:"grid",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {[["Name","Your full name","name"],["Email","your@email.com","email"]].map(([l,ph,k])=>(
                <div key={k}>
                  <label style={{display:"block",fontSize:11,fontWeight:800,letterSpacing:0.5,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",marginBottom:6}}>{l}</label>
                  <input value={formData[k]} onChange={e=>setFormData(d=>({...d,[k]:e.target.value}))} placeholder={ph}
                    style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"10px 14px",color:"#fff",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
                </div>
              ))}
            </div>
            <div>
              <label style={{display:"block",fontSize:11,fontWeight:800,letterSpacing:0.5,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",marginBottom:6}}>Grade Level</label>
              <select value={formData.grade} onChange={e=>setFormData(d=>({...d,grade:e.target.value}))}
                style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"10px 14px",color:"#fff",fontSize:14,boxSizing:"border-box",outline:"none"}}>
                <option value="">Select grade...</option>
                {["6th","7th","8th","9th","10th","11th","12th"].map(g=><option key={g} value={g}>{g} Grade</option>)}
              </select>
            </div>
            <div>
              <label style={{display:"block",fontSize:11,fontWeight:800,letterSpacing:0.5,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",marginBottom:6}}>What are you struggling with?</label>
              <textarea value={formData.message} onChange={e=>setFormData(d=>({...d,message:e.target.value}))} placeholder="e.g. Quadratics, word problems, running out of time..."
                style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"10px 14px",color:"#fff",fontSize:14,minHeight:80,resize:"vertical",boxSizing:"border-box",outline:"none"}}/>
            </div>
            <button onClick={()=>{if(formData.name&&formData.email){setFormSent(true);}else alert("Please enter your name and email.");}}
              style={{background:"#e05c2a",color:"#fff",border:"none",padding:"14px",borderRadius:8,fontWeight:800,fontSize:15,cursor:"pointer",letterSpacing:0.3}}>
              Book My Free Session →
            </button>
            <p style={{color:"rgba(255,255,255,0.35)",fontSize:12,textAlign:"center",margin:0}}>This sends your info to tobias.velez@icloud.com · No spam, ever.</p>
          </div>
        )}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
